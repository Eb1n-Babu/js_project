<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prime Check</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Full height flexbox container -->
<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 400px;">
        <h2 class="text-center mb-4">Prime Number Checker</h2>

        <label class="form-label">Enter a number</label>
        <input id="root" type="number" class="form-control mb-3" placeholder="Enter a number" onchange="primeCheck()">

        <button class="btn btn-primary w-100 mb-3" onclick="onClick()">Check</button>

        <h1 id="result" class="text-center"></h1>
    </div>
</div>

<script src="primeChecking.js"></script>
</body>
</html>
